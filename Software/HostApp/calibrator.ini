[mqtt]
broker_url = 192.168.0.51
broker_port = 1883
keepalive = 60
topic_prefix = MT102/calibrator

[i2c]
pca9685_addresses = 0x50, 0x44
ina219_addresses = 0x40, 0x41, 0x42, 0x43
pca9685_hat_order_swapped = true
ina219_axis_order = 0,2,1

[coils]
# Per-axis shunts (Ω) are on Pico: DEPLOY/config.py INA219_SHUNT_OHMS — e.g. X=1.8 Y=1.3 Z=1.6 (measured).
# Single value below is for any PC-side path that still uses one scalar; prefer matching your build or SIM.
shunt_ohms = 1.0
max_current_per_coil_amps = 1.0
resistance_x_ohms = 10.6
resistance_y_ohms = 11.2
resistance_z_ohms = 13.2
max_total_current_ma = 3000.0
z_on_hat0_when_single = true

[control]
loop_hz = 100
p_gain = 0.5

# No [oled] section: the old Raspberry Pi SSD1309 status display is not used anymore.
# CalibratorPico has no OLED; use CalibratorUI on the PC for status.

[pc]
setpical_rate = 10
simulation_mode = False
supply_voltage_set = 12.0
supply_v_green_lo = 11.875
supply_v_green_hi = 12.125
supply_v_red_below = 11.0

[alarm]
alarm_x_ma = 500
alarm_y_ma = 500
alarm_z_ma = 500

[serial]
device = HWT901B
com_port = 
rs422_port = COM21
rs232_port = COM20
baud_rate = 9600
simulate_mt102 = False

[calibration]
mode = Test
orientation_hold_seconds = 3.0
log_dir = ~/Calibrator/LOGS

[mt102_limits]
raw_green = 2500
raw_amber = 4000
gauss_green = 0.6
gauss_amber = 1.0

[null_field]
null_x_ma = 58
null_y_ma = 92
null_z_ma = 108

[mt102_display]
mag_raw_to_gauss = 0.00001
mag_declination_deg = -11

[pico]
com_port = COM29
baud_rate = 115200
deploy_folder = D:\Calibrator\DriverAndControlApp\DEPLOY

